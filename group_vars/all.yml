---
domain: "{{ vault_domain }}"
web_subdomain: "web.{{ vault_domain }}"
acme_email: "{{ vault_acme_email }}"

# Docker networks (created once, shared across stacks)
docker_networks:
  - proxy
  - miplata_db
  - categorizer_net

# SSH
ssh_allowed_users: ubuntu
ssh_max_auth_tries: 3

# fail2ban
fail2ban_ssh_maxretry: 3
fail2ban_ssh_bantime: 3h
fail2ban_default_bantime: 1h
fail2ban_default_findtime: 10m

# UFW allowed ports
ufw_allowed_ports:
  - { port: 22, proto: tcp, comment: "SSH" }
  - { port: 53, proto: tcp, comment: "DNS-TCP" }
  - { port: 53, proto: udp, comment: "DNS-UDP" }
  - { port: 80, proto: tcp, comment: "HTTP" }
  - { port: 443, proto: tcp, comment: "HTTPS" }

# Traefik
traefik_version: "v3.6.13"
traefik_dashboard_host: "traefik.{{ web_subdomain }}"
traefik_dashboard_auth: "admin:$$2y$$05$$pvEIRx9O8AZhW2Cr6OFufeuwF09Y0xe3VArKdxPeWESSmGnPYCrAq"

# DNS
pdns_image: "powerdns/pdns-auth-49:4.9.13"
pdns_admin_image: "powerdnsadmin/pda-legacy:0.4.2"
pdns_mariadb_image: "mariadb:10.11"
pdns_admin_host: "dns.{{ web_subdomain }}"
pdns_soa: "ns1.{{ domain }}. hostmaster.{{ domain }}. 0 10800 3600 604800 3600"

# Vaultwarden
vaultwarden_image: "vaultwarden/server:1.35.7"
vaultwarden_host: "vault.{{ web_subdomain }}"

# Monitoring
prometheus_image: "prom/prometheus:v3.11.2"
grafana_image: "grafana/grafana:12.4.3"
loki_image: "grafana/loki:3.7.1"
alloy_image: "grafana/alloy:v1.15.1"
cadvisor_image: "ghcr.io/google/cadvisor:0.56.2"
postgres_exporter_image: "prometheuscommunity/postgres-exporter:v0.19.1"
redis_exporter_image: "oliver006/redis_exporter:v1.82.0"
blackbox_exporter_image: "prom/blackbox-exporter:v0.28.0"
alertmanager_image: "prom/alertmanager:v0.32.0"
prometheus_retention: "30d"
prometheus_retention_size: "8GB"
loki_retention: "336h"  # 14 days

# Tempo + tracing (feature-flagged)
enable_tracing: true
tempo_image: "grafana/tempo:2.10.4"
tempo_retention: "168h"       # 7 days
tempo_max_block_bytes: 500000000

# Extra observability exporters
process_exporter_image: "ncabatoff/process-exporter:0.8.7"

grafana_host: "grafana.{{ web_subdomain }}"
loki_push_host: "loki-push.{{ web_subdomain }}"
prom_push_host: "prom-push.{{ web_subdomain }}"
prometheus_ui_host: "prometheus.{{ web_subdomain }}"
grafana_github_admin_login: "GonzMenSeb"
observability_network: "observability"
observability_agent_dir: /opt/observability
loki_push_url: "https://{{ loki_push_host }}/loki/api/v1/push"
prom_push_url: "https://{{ prom_push_host }}/api/v1/write"

# Jenkins
jenkins_host: "jenkins.{{ web_subdomain }}"
jenkins_image: "jenkins/jenkins:lts-jdk21"
github_repo_ssh_url: "git@github.com:GonzMenSeb/vps-infrastructure.git"

# Zot registry (self-hosted OCI registry)
zot_host: "zot.{{ web_subdomain }}"
zot_registry_user: "ci"

# Miplata
miplata_host: "miplata.{{ web_subdomain }}"
miplata_ro_user: metabase_ro
miplata_api_image: "{{ zot_host }}/miplata/api:latest"
miplata_web_image: "{{ zot_host }}/miplata/web:latest"
miplata_repo_ssh_url: "git@github.com:GonzMenSeb/miplata.git"

# Metabase
metabase_image: "metabase/metabase:v0.60.1"
metabase_postgres_image: "postgres:16-alpine"
metabase_host: "metabase.{{ web_subdomain }}"

# LLM inference (self-hosted Qwen3-4B via llama.cpp's llama-server).
# TODO: verify this tag resolves against ghcr.io/ggml-org/llama.cpp before first deploy.
llm_inference_image: "ghcr.io/ggml-org/llama.cpp:server"

# Transaction categorizer (Colombian-Spanish cascade).
# Self-hosted, no Claude fallback in production (per user policy).
# Image is built by Jenkins job `categorizer-deploy` and pushed to Zot.
categorizer_host: "categorizer.{{ web_subdomain }}"
categorizer_image: "{{ zot_host }}/miplata/categorizer:latest"
categorizer_postgres_image: "pgvector/pgvector:pg16"
categorizer_repo_ssh_url: "git@github.com:GonzMenSeb/miplata-categorizer.git"
