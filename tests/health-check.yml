---
- name: Post-deploy health checks
  hosts: vps
  become: true
  vars_files:
    - ../vault.yml

  tasks:
    # ── CRITICAL: SSH still works ──
    - name: Verify SSH is reachable
      wait_for:
        port: 22
        host: "{{ ansible_host }}"
        timeout: 10
      delegate_to: localhost
      become: false

    # ── Firewall ──
    - name: Verify UFW is active with deny default
      command: ufw status verbose
      register: ufw_status
      changed_when: false
      failed_when: "'Status: active' not in ufw_status.stdout or 'deny (incoming)' not in ufw_status.stdout"

    # ── fail2ban ──
    - name: Verify fail2ban is running
      command: fail2ban-client status sshd
      register: f2b_status
      changed_when: false
      failed_when: f2b_status.rc != 0

    # ── Docker daemon ──
    - name: Verify Docker is running
      command: docker info
      register: docker_info
      changed_when: false
      failed_when: docker_info.rc != 0

    # ── Core containers ──
    - name: Get running container names
      shell: docker ps --filter "status=running" --format "{% raw %}{{.Names}}{% endraw %}"
      register: running_containers
      changed_when: false

    - name: Verify Traefik is running
      assert:
        that: "'traefik' in running_containers.stdout_lines"
        fail_msg: "Traefik container is not running"

    - name: Verify Vaultwarden is running
      assert:
        that: "'vaultwarden' in running_containers.stdout_lines"
        fail_msg: "Vaultwarden container is not running"

    - name: Verify PowerDNS is running
      assert:
        that: "'pdns' in running_containers.stdout_lines"
        fail_msg: "PowerDNS container is not running"

    - name: Verify PowerDNS DB is running
      assert:
        that: "'pdns-db' in running_containers.stdout_lines"
        fail_msg: "PowerDNS MariaDB container is not running"

    - name: Verify PowerDNS Admin is running
      assert:
        that: "'pdns-admin' in running_containers.stdout_lines"
        fail_msg: "PowerDNS Admin container is not running"

    - name: Verify Zot registry is running
      assert:
        that: "'zot' in running_containers.stdout_lines"
        fail_msg: "Zot registry container is not running"

    # ── Observability stack (Phase 1) ──
    - name: Verify Prometheus is running
      assert:
        that: "'prometheus' in running_containers.stdout_lines"
        fail_msg: "Prometheus container is not running"

    - name: Verify Loki is running
      assert:
        that: "'loki' in running_containers.stdout_lines"
        fail_msg: "Loki container is not running"

    - name: Verify Grafana is running
      assert:
        that: "'grafana' in running_containers.stdout_lines"
        fail_msg: "Grafana container is not running"

    - name: Verify Alloy is running
      assert:
        that: "'alloy' in running_containers.stdout_lines"
        fail_msg: "Alloy container is not running"

    - name: Verify Alloy is ready
      uri:
        url: http://127.0.0.1:12345/-/ready
        status_code: 200
        timeout: 5

    - name: Verify cAdvisor is running
      assert:
        that: "'cadvisor' in running_containers.stdout_lines"
        fail_msg: "cAdvisor container is not running"

    - name: Verify blackbox-exporter is running
      assert:
        that: "'blackbox-exporter' in running_containers.stdout_lines"
        fail_msg: "blackbox-exporter container is not running"

    # Miplata containers only assert once the first Jenkins build has landed
    # images in the registry. On fresh bootstrap the role tolerates missing
    # images; this mirrors that behavior.
    - name: Check whether miplata images are present locally
      shell: docker images -q {{ miplata_api_image }}
      register: miplata_image_check
      changed_when: false

    - name: Verify Miplata Postgres is running
      assert:
        that: "'miplata-postgres' in running_containers.stdout_lines"
        fail_msg: "Miplata Postgres container is not running"
      when: miplata_image_check.stdout | length > 0

    - name: Verify Miplata Redis is running
      assert:
        that: "'miplata-redis' in running_containers.stdout_lines"
        fail_msg: "Miplata Redis container is not running"
      when: miplata_image_check.stdout | length > 0

    - name: Verify Miplata API is running
      assert:
        that: "'miplata-api' in running_containers.stdout_lines"
        fail_msg: "Miplata API container is not running"
      when: miplata_image_check.stdout | length > 0

    - name: Verify Miplata Web is running
      assert:
        that: "'miplata-web' in running_containers.stdout_lines"
        fail_msg: "Miplata Web container is not running"
      when: miplata_image_check.stdout | length > 0

    - name: Verify postgres-exporter is running
      assert:
        that: "'postgres-exporter' in running_containers.stdout_lines"
        fail_msg: "postgres-exporter container is not running"
      when: miplata_image_check.stdout | length > 0

    - name: Verify redis-exporter is running
      assert:
        that: "'redis-exporter' in running_containers.stdout_lines"
        fail_msg: "redis-exporter container is not running"
      when: miplata_image_check.stdout | length > 0

    # ── Metabase ──
    - name: Check whether metabase container exists
      shell: docker ps -a --filter "name=^metabase$" --format "{% raw %}{{.Names}}{% endraw %}"
      register: metabase_container_check
      changed_when: false

    - name: Verify Metabase DB is running
      assert:
        that: "'metabase-db' in running_containers.stdout_lines"
        fail_msg: "Metabase DB container is not running"
      when: metabase_container_check.stdout | length > 0

    - name: Verify Metabase is running
      assert:
        that: "'metabase' in running_containers.stdout_lines"
        fail_msg: "Metabase container is not running"
      when: metabase_container_check.stdout | length > 0

    # ── Container health status ──
    - name: Check container health statuses
      shell: docker ps --filter "health=unhealthy" --format "{% raw %}{{.Names}}{% endraw %}"
      register: unhealthy
      changed_when: false

    - name: Report unhealthy containers
      fail:
        msg: "Unhealthy containers found: {{ unhealthy.stdout }}"
      when: unhealthy.stdout | length > 0

    # ── TLS ──
    - name: Verify Vaultwarden TLS is valid
      uri:
        url: "https://vault.web.example.com/alive"
        status_code: 200
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify Traefik dashboard responds
      uri:
        url: "https://traefik.web.example.com"
        status_code: [200, 401]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify PowerDNS Admin responds
      uri:
        url: "https://dns.web.example.com"
        status_code: [200, 302]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify Zot registry responds over TLS (unauth /v2/ should 401)
      uri:
        url: "https://{{ zot_host }}/v2/"
        status_code: 401
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify Miplata responds over TLS
      uri:
        url: "https://{{ miplata_host }}"
        status_code: [200, 301, 302]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false
      when: miplata_image_check.stdout | length > 0

    - name: Verify Metabase responds over TLS (JVM startup can take ~90s)
      uri:
        url: "https://{{ metabase_host }}"
        status_code: [200, 302]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false
      register: metabase_tls
      until: metabase_tls.status in [200, 302]
      retries: 12
      delay: 10
      when: metabase_container_check.stdout | length > 0

    # ── Observability TLS + auth ──
    - name: Verify Grafana responds over TLS (login page)
      uri:
        url: "https://{{ grafana_host }}/login"
        status_code: 200
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify Grafana health endpoint
      uri:
        url: "https://{{ grafana_host }}/api/health"
        status_code: 200
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify loki-push rejects requests without bearer token
      uri:
        url: "https://{{ loki_push_host }}/ready"
        status_code: [401, 403]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify loki-push accepts requests with bearer token
      uri:
        url: "https://{{ loki_push_host }}/ready"
        status_code: 200
        validate_certs: true
        headers:
          Authorization: "Bearer {{ vault_observability_push_token }}"
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify prom-push rejects requests without bearer token
      uri:
        url: "https://{{ prom_push_host }}/-/ready"
        status_code: [401, 403]
        validate_certs: true
        timeout: 10
      delegate_to: localhost
      become: false

    - name: Verify prom-push accepts requests with bearer token
      uri:
        url: "https://{{ prom_push_host }}/-/ready"
        status_code: 200
        validate_certs: true
        headers:
          Authorization: "Bearer {{ vault_observability_push_token }}"
        timeout: 10
      delegate_to: localhost
      become: false

    # ── Observability scrape targets ──
    - name: Wait for core Phase 2 scrape targets to be up
      uri:
        url: "http://127.0.0.1:9090/api/v1/query?query=up"
        return_content: true
      register: up_query
      until: >
        up_query.status == 200 and
        (up_query.json.data.result
          | selectattr('metric.job', 'in', ['alloy', 'cadvisor', 'traefik', 'node_exporter', 'zot'])
          | selectattr('value.1', 'equalto', '1')
          | list | length >= 5)
      retries: 12
      delay: 5

    # ── DNS ──
    - name: Verify DNS responds on port 53
      command: dig @{{ vps_public_ip }} example.com SOA +short +timeout=5
      delegate_to: localhost
      become: false
      register: dns_check
      changed_when: false
      failed_when: dns_check.rc != 0

    # ── Ports ──
    - name: Verify HTTP port is open
      wait_for:
        host: "{{ ansible_host }}"
        port: 80
        timeout: 5
      delegate_to: localhost
      become: false

    - name: Verify HTTPS port is open
      wait_for:
        host: "{{ ansible_host }}"
        port: 443
        timeout: 5
      delegate_to: localhost
      become: false

    - name: Health check summary
      debug:
        msg: "All {{ ansible_play_hosts | length }} health checks passed for {{ inventory_hostname }}"
