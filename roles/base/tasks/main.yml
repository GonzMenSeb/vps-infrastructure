---
- name: Install base packages
  apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Enable unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

# SSH hardening
- name: Configure SSH hardening
  template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    mode: "0644"
  notify: restart sshd

# UFW
- name: Set UFW default deny incoming
  ufw:
    direction: incoming
    policy: deny

- name: Set UFW default allow outgoing
  ufw:
    direction: outgoing
    policy: allow

- name: Allow UFW ports
  ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_allowed_ports }}"

# node_exporter runs on the host and is scraped by containerized Alloy.
# Traffic from Docker bridge networks must be allowed to reach :9100 on
# the host. We scope the rule to Docker's reserved 172.16.0.0/12 range so
# this does not expose node_exporter to the public internet.
- name: Allow node_exporter from Docker bridge subnets
  ufw:
    rule: allow
    from_ip: 172.16.0.0/12
    to_port: "9100"
    proto: tcp
    comment: "node_exporter from Docker bridges"

- name: Enable UFW
  ufw:
    state: enabled

# fail2ban
- name: Configure fail2ban
  template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: "0644"
  notify: restart fail2ban

- name: Enable fail2ban
  systemd:
    name: fail2ban
    enabled: true
    state: started
