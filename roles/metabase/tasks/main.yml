---
- name: Create Metabase directory
  file:
    path: "{{ metabase_dir }}"
    state: directory
    mode: "0755"

- name: Create Metabase .env file
  template:
    src: env.j2
    dest: "{{ metabase_dir }}/.env"
    owner: root
    group: "{{ ssh_allowed_users }}"
    mode: "0640"

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ metabase_dir }}/docker-compose.yml"
    owner: root
    group: "{{ ssh_allowed_users }}"
    mode: "0644"

- name: Ensure DNS A record for metabase
  command: >
    docker exec pdns pdnsutil replace-rrset
    {{ web_subdomain }}
    metabase
    A 3600 {{ vps_public_ip }}
  register: metabase_dns
  changed_when: "'New rrset' in metabase_dns.stdout or 'Current rrset' in metabase_dns.stdout"

- name: Check if Metabase compose file exists (first deploy guard)
  stat:
    path: "{{ metabase_dir }}/docker-compose.yml"
  register: metabase_compose_file

- name: Start Metabase stack
  community.docker.docker_compose_v2:
    project_src: "{{ metabase_dir }}"
    state: present
    pull: always
  when: metabase_compose_file.stat.exists

# ── Automated setup (runs once — skipped after initial setup) ──
- name: Wait for Metabase API to be ready
  uri:
    url: "https://{{ metabase_host }}/api/health"
    validate_certs: true
    status_code: 200
  delegate_to: localhost
  become: false
  check_mode: false
  register: metabase_health
  until: metabase_health.status == 200
  retries: 18
  delay: 10
  when: metabase_compose_file.stat.exists

- name: Check if Metabase setup is needed
  uri:
    url: "https://{{ metabase_host }}/api/session/properties"
    validate_certs: true
    return_content: true
  delegate_to: localhost
  become: false
  check_mode: false
  register: metabase_props
  when: metabase_compose_file.stat.exists

- name: Complete Metabase initial setup (admin user)
  uri:
    url: "https://{{ metabase_host }}/api/setup"
    method: POST
    validate_certs: true
    body_format: json
    body:
      token: "{{ metabase_props.json['setup-token'] }}"
      user:
        first_name: "{{ metabase_admin_first_name }}"
        last_name: "{{ metabase_admin_last_name }}"
        email: "{{ metabase_admin_email }}"
        password: "{{ vault_metabase_admin_password }}"
        site_name: "{{ metabase_site_name }}"
      prefs:
        site_name: "{{ metabase_site_name }}"
        site_locale: en
        allow_tracking: false
    status_code: 200
  delegate_to: localhost
  become: false
  no_log: true
  register: metabase_setup_result
  when: metabase_compose_file.stat.exists and not metabase_props.json['has-user-setup']

- name: Add Miplata database connection
  uri:
    url: "https://{{ metabase_host }}/api/database"
    method: POST
    validate_certs: true
    body_format: json
    headers:
      X-Metabase-Session: "{{ metabase_setup_result.json.id }}"
    body:
      engine: postgres
      name: Miplata
      details:
        host: miplata-postgres
        port: 5432
        dbname: "{{ miplata_db_name }}"
        user: "{{ miplata_ro_user }}"
        password: "{{ vault_miplata_ro_password }}"
        ssl: false
    status_code: 200
  delegate_to: localhost
  become: false
  no_log: true
  when: metabase_setup_result is changed
