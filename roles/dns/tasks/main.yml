---
- name: Create DNS directory
  file:
    path: "{{ dns_dir }}"
    state: directory
    mode: "0755"

- name: Copy PowerDNS config
  template:
    src: pdns.conf.j2
    dest: "{{ dns_dir }}/pdns.conf"
    mode: "0644"
  notify: restart dns

- name: Create DNS .env file
  template:
    src: env.j2
    dest: "{{ dns_dir }}/.env"
    mode: "0600"

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ dns_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start DNS stack
  community.docker.docker_compose_v2:
    project_src: "{{ dns_dir }}"
    state: present
    pull: missing
