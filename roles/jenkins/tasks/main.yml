---
- name: Stop and disable systemd Jenkins (replaced by container)
  systemd:
    name: jenkins
    state: stopped
    enabled: false
  ignore_errors: true

- name: Create Jenkins directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"
  loop:
    - "{{ jenkins_dir }}"
    - "{{ jenkins_data_dir }}"
    - "{{ jenkins_data_dir }}/.ssh"

- name: Get host docker group GID
  command: getent group docker
  register: jenkins_docker_group
  changed_when: false

- name: Set docker GID fact for Jenkins container
  set_fact:
    jenkins_host_docker_gid: "{{ jenkins_docker_group.stdout.split(':')[2] }}"

- name: Copy Dockerfile and plugins
  copy:
    src: "{{ item }}"
    dest: "{{ jenkins_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - Dockerfile
    - plugins.txt
  register: jenkins_image_files

- name: Build Jenkins image
  community.docker.docker_image:
    name: jenkins-ansible
    tag: latest
    source: build
    build:
      path: "{{ jenkins_dir }}"
    force_source: "{{ jenkins_image_files.changed }}"

- name: Deploy Jenkins GitHub SSH key (vps-infrastructure repo)
  copy:
    content: "{{ vault_jenkins_github_ssh_key }}"
    dest: "{{ jenkins_data_dir }}/.ssh/github_key"
    mode: "0600"
    owner: "1000"
    group: "1000"

- name: Deploy Jenkins GitHub SSH key (miplata repo)
  copy:
    content: "{{ vault_jenkins_miplata_ssh_key }}"
    dest: "{{ jenkins_data_dir }}/.ssh/github_miplata_key"
    mode: "0600"
    owner: "1000"
    group: "1000"

- name: Deploy Jenkins VPS SSH key
  copy:
    content: "{{ vault_jenkins_vps_ssh_key }}"
    dest: "{{ jenkins_data_dir }}/.ssh/vps_key"
    mode: "0600"
    owner: "1000"
    group: "1000"

- name: Configure SSH known hosts for GitHub
  shell: ssh-keyscan github.com > {{ jenkins_data_dir }}/.ssh/known_hosts 2>/dev/null
  args:
    creates: "{{ jenkins_data_dir }}/.ssh/known_hosts"

- name: Set known_hosts permissions
  file:
    path: "{{ jenkins_data_dir }}/.ssh/known_hosts"
    mode: "0644"
    owner: "1000"
    group: "1000"

- name: Deploy JCasC config
  template:
    src: casc.yml.j2
    dest: "{{ jenkins_data_dir }}/casc.yml"
    mode: "0644"
    owner: "1000"
    group: "1000"
  notify: restart jenkins

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ jenkins_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Jenkins stack
  community.docker.docker_compose_v2:
    project_src: "{{ jenkins_dir }}"
    state: present

- name: Install weekly docker prune cron on jenkins host
  ansible.builtin.cron:
    name: "jenkins-docker-weekly-prune"
    minute: "0"
    hour: "3"
    weekday: "0"
    user: root
    job: >-
      /usr/bin/docker system prune -af --filter "until=168h" >> /var/log/jenkins-docker-prune.log 2>&1 &&
      /usr/bin/docker builder prune -af --filter "unused-for=168h" >> /var/log/jenkins-docker-prune.log 2>&1 &&
      tail -c 100000 /var/log/jenkins-docker-prune.log > /var/log/jenkins-docker-prune.log.new &&
      mv /var/log/jenkins-docker-prune.log.new /var/log/jenkins-docker-prune.log
