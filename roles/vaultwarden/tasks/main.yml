---
- name: Create Vaultwarden directory
  file:
    path: "{{ vaultwarden_dir }}"
    state: directory
    mode: "0755"

- name: Create Vaultwarden data directory
  file:
    path: "{{ vaultwarden_dir }}/data"
    state: directory
    mode: "0755"

- name: Create Vaultwarden .env file
  template:
    src: env.j2
    dest: "{{ vaultwarden_dir }}/.env"
    mode: "0600"

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ vaultwarden_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Vaultwarden
  community.docker.docker_compose_v2:
    project_src: "{{ vaultwarden_dir }}"
    state: present
    pull: missing
