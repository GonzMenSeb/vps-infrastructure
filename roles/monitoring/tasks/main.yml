---
- name: Create monitoring directory
  file:
    path: "{{ monitoring_dir }}"
    state: directory
    mode: "0755"

- name: Create Grafana provisioning subdirectory
  file:
    path: "{{ monitoring_dir }}/grafana-provisioning"
    state: directory
    mode: "0755"

- name: Copy Prometheus config
  template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_dir }}/prometheus.yml"
    mode: "0644"
  notify: restart monitoring

- name: Create Prometheus rules directory
  file:
    path: "{{ monitoring_dir }}/prometheus-rules"
    state: directory
    mode: "0755"

- name: Copy Prometheus alert rules
  template:
    src: prometheus-rules.yml.j2
    dest: "{{ monitoring_dir }}/prometheus-rules/alerts.yml"
    mode: "0644"
  notify: reload prometheus

- name: Copy Loki config
  template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_dir }}/loki-config.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy Alloy config
  template:
    src: alloy-config.alloy.j2
    dest: "{{ monitoring_dir }}/alloy-config.alloy"
    mode: "0644"
  notify: restart monitoring

- name: Copy Blackbox config
  template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_dir }}/blackbox.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy process-exporter config
  template:
    src: process-exporter.yml.j2
    dest: "{{ monitoring_dir }}/process-exporter.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy Alertmanager config
  template:
    src: alertmanager.yml.j2
    dest: "{{ monitoring_dir }}/alertmanager.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy Grafana config
  template:
    src: grafana.ini.j2
    dest: "{{ monitoring_dir }}/grafana.ini"
    mode: "0640"
  notify: restart monitoring

- name: Copy Grafana datasource provisioning
  template:
    src: grafana-provisioning-datasources.yml.j2
    dest: "{{ monitoring_dir }}/grafana-provisioning/datasources.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy Grafana dashboard provisioning
  template:
    src: grafana-provisioning-dashboards.yml.j2
    dest: "{{ monitoring_dir }}/grafana-provisioning/dashboards.yml"
    mode: "0644"
  notify: restart monitoring

- name: Copy Grafana dashboards
  copy:
    src: dashboards/
    dest: "{{ monitoring_dir }}/dashboards/"
    mode: "0644"
  notify: restart monitoring

- name: Remove deprecated Promtail config (replaced by Alloy)
  file:
    path: "{{ monitoring_dir }}/promtail.yml"
    state: absent

- name: Remove legacy Promtail container (superseded by Alloy)
  community.docker.docker_container:
    name: promtail
    state: absent
  failed_when: false

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_dir }}"
    state: present
    pull: missing

- name: Ensure DNS A record for Prometheus UI
  command: >
    docker exec pdns pdnsutil replace-rrset
    {{ web_subdomain }}
    prometheus
    A 3600 {{ vps_public_ip }}
  register: prometheus_ui_dns
  changed_when: "'New rrset' in prometheus_ui_dns.stdout or 'Current rrset' in prometheus_ui_dns.stdout"

- name: Wait for Alloy readiness
  uri:
    url: http://127.0.0.1:12345/-/ready
    status_code: 200
  register: alloy_ready
  retries: 10
  delay: 3
  until: alloy_ready.status == 200

# node_exporter (runs on the host, not in Docker)
- name: Check if node_exporter binary exists
  stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_bin

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.9.0/node_exporter-1.9.0.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
  when: not node_exporter_bin.stat.exists

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true
  when: not node_exporter_bin.stat.exists

- name: Install node_exporter binary
  copy:
    src: /tmp/node_exporter-1.9.0.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true
  when: not node_exporter_bin.stat.exists

- name: Create node_exporter user
  user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

# Textfile collector target. The --collector.textfile.directory flag on
# node_exporter.service reads *.prom files from here; Ansible and other tools
# drop metric files in as part of their post_tasks.
- name: Ensure node_exporter textfile directory exists
  file:
    path: /var/lib/node_exporter/textfile
    state: directory
    owner: node_exporter
    group: node_exporter
    mode: "0755"

- name: Install node_exporter systemd service
  copy:
    src: node_exporter.service
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify: restart node_exporter

- name: Enable node_exporter
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
