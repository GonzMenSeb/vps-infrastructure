---
- name: Create Zot directory
  file:
    path: "{{ zot_dir }}"
    state: directory
    mode: "0755"

- name: Render Zot config
  template:
    src: config.json.j2
    dest: "{{ zot_dir }}/config.json"
    mode: "0644"
  notify: restart zot

- name: Render Zot htpasswd
  template:
    src: htpasswd.j2
    dest: "{{ zot_dir }}/htpasswd"
    mode: "0600"
  notify: restart zot

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ zot_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Zot stack
  community.docker.docker_compose_v2:
    project_src: "{{ zot_dir }}"
    state: present
    pull: missing

- name: Ensure DNS A record for Zot registry
  command: >
    docker exec pdns pdnsutil replace-rrset
    {{ web_subdomain }}
    {{ zot_host | regex_replace('\.' ~ web_subdomain ~ '$', '') }}
    A 3600 {{ vps_public_ip }}
  register: zot_dns
  changed_when: "'New rrset' in zot_dns.stdout or 'Current rrset' in zot_dns.stdout"

- name: Wait for Zot HTTP to be ready
  uri:
    url: "https://{{ zot_host }}/v2/"
    status_code: [200, 401]
    validate_certs: true
  register: zot_ready
  retries: 10
  delay: 3
  until: zot_ready.status in [200, 401]
  delegate_to: localhost
  become: false
