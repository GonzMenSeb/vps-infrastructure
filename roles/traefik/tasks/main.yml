---
- name: Create Traefik directory
  file:
    path: "{{ traefik_dir }}"
    state: directory
    mode: "0755"

- name: Copy Traefik static config
  template:
    src: traefik.yml.j2
    dest: "{{ traefik_dir }}/traefik.yml"
    mode: "0644"
  notify: restart traefik

- name: Copy nginx socket proxy config
  copy:
    src: "{{ item }}"
    dest: "{{ traefik_dir }}/{{ item }}"
    mode: "0644"
  loop:
    - nginx.conf
    - nginx-docker-proxy.conf
  notify: restart traefik

- name: Copy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_dir }}/docker-compose.yml"
    mode: "0644"

- name: Ensure acme.json exists with correct permissions
  file:
    path: "{{ traefik_dir }}/acme.json"
    state: touch
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Start Traefik stack
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_dir }}"
    state: present
    pull: missing
